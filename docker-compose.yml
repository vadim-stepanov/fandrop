services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: fandrop
      POSTGRES_USER: fandrop
      POSTGRES_PASSWORD: dev
    ports: ["5432:5432"]
    volumes: ["postgres-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fandrop -d fandrop"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7
    ports: ["6379:6379"]
    volumes: ["redis-data:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
  redis-data:
